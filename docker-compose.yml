version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tcg_postgres
    environment:
      POSTGRES_DB: tcg
      POSTGRES_USER: tcg
      POSTGRES_PASSWORD: tcg
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcg -d tcg"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.22-community
    container_name: tcg_neo4j
    environment:
      NEO4J_AUTH: neo4j/tcgpassword
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.11.1
    container_name: tcg_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
